<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>servicios</title>
    <link rel="stylesheet" href="servicios.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">
            <h1>CAMPUS <span>PARKING</span></h1>
        </div>

        <nav>
            <a href="">inicio</a>
            <a href="dashboard.html">Resumen del dia</a>
            <a href="servicios.html">agregar vehiculo al parqueo</a>
            <a href="perfil.html">perfil</a>
            <a href="index.html">cerrar sesion</a>
        </nav>

    </aside>

    <section class="servicios">
        <div class="registro-servicio">
            <h2>Registrar servicios</h2>
            <form id="form-servicios">
                <input type="text" placeholder="placa" id="placa">
                <select id="tipo">
                    <option>Seleccione tipo</option>

                </select>
                <input type="date" id="fecha">

                <input type="number" placeholder="slot" id="slot" min="1" max="20" step="1">

                <button type="button" id="btn-agregar" onclick="agregarVehiculo()">Registrar</button>

                <button type="button" onclick="retirarVehiculo()">Retirar Vehículo</button>

                <button type="button" onclick="mostrarTabla()">Actualizar Tabla</button>





            </form>
        </div>

        <div class="lista-servicios">
            <h2>Vehiculos en parqueo</h2>

            <table>
                <thead>
                    <tr>
                        <th>numero entrada</th>
                        <th>Placa</th>
                        <th>Tipo</th>
                        <th>fecha</th>
                        <th>Hora entrada</th>
                        <th class="slots">Slot</th>

                    </tr>
                </thead>
                <tbody id="tabla-servicios"></tbody>
            </table>
        </div>

    </section>
    
    <dialog id="modal-ticket"
        style="border: none; border: radius 8px; padding: 20px; box-shadow: 0 4px rgba(0, 0, 0, 0.3); width: 320px; font-family: monospace">
        <div style="text-align:center;">
            <h3 style="margin: 0 0 10px 0;"> ======CAMPUS PARKING======</h3>
        </div>

        <div>
            <div>Placa<strong id="tk-placa"></strong></div>
            <div>Tipo:<strong id="tk-tipo"></strong></div>
            <div>Slot:</slot><strong id="tk-slot"></strong></div>
            <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
            <div>Ingreso:<span id="tk-ingreso"></span></div>
            <div>Salida:<span id="tk-salida"></span></div>
            <div>Tiempo:<span id="tk-tiempo"></span></div>
            <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
            <div style="font-size: 1.2em;"><strong>Monto total: Q <span id="tk-total"></span></strong></div>
        </div>

        <p style="text-align: center; margin-bottom: 15px; font-family: Arial, sans-serif; font-size: 0.9em;">¿Deseas
            imprimir tu factura?</p>

        <div style="display: flex; gap:10px">
            <button onclick="imprimirTicket()"
                style="flex: 1; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Sí,
                Imprimir</button>
            <button onclick="cerrarTicket()"
                style="flex: 1; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">No
                Imprimir</button>
        </div>
    </dialog>

    <style>
        #modal-ticket::backdrop{
            background-color: rgba(0, 0, 0, 0.6);
        }
    </style>
    <script src="agregarVehiculo.js"></script>

</body>

</html>
